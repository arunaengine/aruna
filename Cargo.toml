[workspace]
members = [
    "aruna-net",
    "aruna",
    "aruna-metadata",
    "aruna-data",
    "aruna-realm",
    "aruna-storage",
    "aruna-permission",
    "aruna-task",
    "hacks"
]
resolver = "2"

[workspace.package]
description = "A federated data orchestration network"
version = "3.0.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
async-channel = "2.3.1"
ahash = "0.8.12"
anyhow = "1.0.98"
async-trait = "0.1.88"
axum = "0.8.4"
axum-extra = {version = "0.10.1", features = ["query"]}
blake3 = { version = "1.8.2", features = ["serde"] }
casbin = { version = "2.10.1", features = ["explain", "logging"]}
chrono = { version = "0.4.41", features = ["serde"]}
data-encoding = "2.9.0"
dotenvy = "0.15.7"
ed25519-dalek = { version = "2.1.1", features = ["rand_core", "pem"] }
futures = "0.3.31"
futures-util = "0.3.31"
iroh = "0.91.2"
iroh-base = "0.91.2"
opentelemetry = "0.30.0"
opentelemetry-otlp = { version = "0.30.0", features = ["grpc-tonic"]}
opentelemetry_sdk = { version = "0.30.0", features = ["rt-tokio"]}
parking_lot = { version = "0.12.4", features = ["deadlock_detection"] }
postcard = "1.1.1"
rand = "0.8.5"
serde = { version = "1.0.218", features = ["derive"] }
serde_json = "1.0.140"
thiserror = "2.0.12"
tokio = { version = "1.45.1", features = ["full", "tracing"] }
console-subscriber = "0.4.1"
tracing = "0.1.41"
tracing-opentelemetry = "0.31.0"
tracing-subscriber = { version = "0.3.19", features = [
    "env-filter",
    "time",
    "fmt",
    "registry",
] }
ulid = { version = "1.2.1", features = ["serde"] }
utoipa = { version = "5.3.1", features = ["chrono", "axum_extras", "ulid", "url"] }
utoipa-axum = "0.2.0"
utoipa-swagger-ui = { version = "9.0.1", features = ["axum"] }

[profile.release]
panic = "abort"
