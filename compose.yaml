      OTEL_SERVICE_NAME: "aruna-1"
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8080/api/v3/info || exit 1']
      interval: 5s
      timeout: 5s
      retries: 30
    depends_on:
      keycloak:
