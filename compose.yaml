services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.3
    ports:
      - 1998:8080
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin      
      KC_HEALTH_ENABLED: true
    volumes:
      - ./aruna/tests/realm.json:/opt/keycloak/data/import/realm.json
    command: "start-dev --import-realm"
    healthcheck:
      # I hate keycloak
      test: ['CMD-SHELL', '[ -f /tmp/HealthCheck.java ] || echo "public class HealthCheck { public static void main(String[] args) throws java.lang.Throwable { System.exit(java.net.HttpURLConnection.HTTP_OK == ((java.net.HttpURLConnection)new java.net.URL(args[0]).openConnection()).getResponseCode() ? 0 : 1); } }" > /tmp/HealthCheck.java && java /tmp/HealthCheck.java http://localhost:9000/health/live']
      interval: 5s
      timeout: 5s
      retries: 30
  jaeger:
    profiles: [ debug ]
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - 16686:16686 
      - 4317:4317 
      - 4318:4318
      - 5778:5778
      - 9411:9411
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.10.0
  minio:
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
    image: minio/minio
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_DOMAIN: minio:9000
    command: "server /data --console-address ':9001'"
  auth:
    network_mode: "host"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    image: auth_mock:latest
    pull_policy: never
    build: 
      context: ./hacks
      tags:
        - auth_mock:latest
    environment: 
      BIND_ADDR: "0.0.0.0:3000"
      ISSUER_URL: "http://localhost:1998/realms/test"
      CLIENT_SECRET: "QgBl9I2CD3eVhL7LFvkHrYUK7oKL3LE2"
      REDIRECT_URL: "http://localhost:3000/callback"
    depends_on:
      keycloak:
        condition: service_healthy
  aruna-1:
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    image: aruna:latest
    pull_policy: never
    build: 
      context: .
      tags:
        - aruna:latest
    network_mode: "host"
    environment:
      REALM_KEY: |-
        -----BEGIN PRIVATE KEY-----
        MFECAQEwBQYDK2VwBCIEIJucl73sk/By4tUQqsv1qopNy1Bi+EWhPugOxB+dyFRW
        gSEAtOYxE8jy2F90OEGr7NixCoc6pDIHMG2GwhKWfJqMGQA=
        -----END PRIVATE KEY-----
      P2P_KEY: "83257bf8205619d904bf4f7b007a1178924c2cd8c7aec6341c63fbfccddee8e0"
      P2P_ADDRESS: "0.0.0.0"
      P2P_PORT: 1230
